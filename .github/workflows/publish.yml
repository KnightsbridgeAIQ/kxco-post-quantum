name: publish

# Triggered by pushing a v* tag (e.g. v1.0.3), or manually via the Actions
# UI / GitHub API by dispatching with a tag name.
#
# Auth via npm Trusted Publishing — npm verifies the publish through OIDC
# against this workflow run (org=JackKXCO, repo=kxco-post-quantum, workflow
# file=publish.yml). No NPM_TOKEN secret, no NPM_OTP, no long-lived
# credential of any kind. Provenance is minted automatically as part of the
# OIDC publish.
#
# All third-party actions are pinned by 40-char commit SHA so a hijacked
# floating tag cannot inject a malicious step into a release run.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or ref to publish (e.g. v1.0.3)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write   # required for npm Trusted Publishing OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Node 20 with npm registry
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish (Trusted Publishing + provenance via OIDC)
        run: npm publish --provenance --access public
