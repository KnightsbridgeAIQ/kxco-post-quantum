name: publish

# Triggered by pushing a v* tag (e.g. v1.1.1), or manually via the Actions
# UI / GitHub API by dispatching with a tag name.
#
# Auth path: npm Trusted Publishing via GitHub Actions OIDC.
# Registered at https://www.npmjs.com/package/kxco-post-quantum/access
# binding org=JackKXCO, repo=kxco-post-quantum, workflow=publish.yml.
# No NPM_TOKEN secret. No NPM_OTP. Nothing rotates, nothing leaks.
# Provenance is minted automatically by the OIDC publish.
#
# All third-party actions are pinned by 40-char commit SHA.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or ref to publish (e.g. v1.1.1)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write   # required for both Trusted Publishing AND --provenance OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Node 20 with npm registry
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm CLI to >=11.5.1
        # Node 20 ships npm 10.x. Trusted Publishing's OIDC integration was
        # added in npm 11.5.1 — older CLI versions fall through to a 404 PUT.
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish (Trusted Publishing + provenance via OIDC)
        run: npm publish --provenance --access public
