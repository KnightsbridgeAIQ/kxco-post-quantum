name: publish

# Triggered by pushing a v* tag (e.g. v1.1.0), or manually via the Actions
# UI / GitHub API by dispatching with a tag name.
#
# Auth path: NPM_TOKEN secret + optional NPM_OTP (a recovery code or fresh
# TOTP) when the npm account has 2FA in auth-and-publish mode. Provenance is
# attached via npm's --provenance flag using the workflow's id-token OIDC.
#
# Long-term: set up Trusted Publishing for this package at
# https://www.npmjs.com/package/kxco-post-quantum/access — then NPM_TOKEN
# and NPM_OTP can both be removed.
#
# All third-party actions are pinned by 40-char commit SHA.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or ref to publish (e.g. v1.1.0)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write   # required for npm --provenance OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Node 20 with npm registry auth
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_OTP:         ${{ secrets.NPM_OTP }}
        run: |
          if [ -n "$NPM_OTP" ]; then
            npm publish --provenance --access public --otp="$NPM_OTP"
          else
            npm publish --provenance --access public
          fi
