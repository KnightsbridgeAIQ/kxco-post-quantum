name: publish

# Triggered by pushing a v* tag (e.g. v1.0.3).
# Ships an npm release with SLSA-Level-2 provenance via the npm CLI's built-in
# --provenance flag, which mints an OIDC token from this workflow's id-token
# permission and signs the published tarball against this commit.
#
# All third-party actions are pinned by 40-char commit SHA so a hijacked
# floating tag cannot inject a malicious step into a release run.
#
# If the npm account has 2FA in auth-and-publish mode, also set the NPM_OTP
# repo secret to a fresh TOTP or recovery code before running.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or ref to publish (e.g. v1.0.3)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write   # required for npm --provenance OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Node 20 with npm registry auth
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_OTP:         ${{ secrets.NPM_OTP }}
        run: |
          if [ -n "$NPM_OTP" ]; then
            npm publish --provenance --access public --otp="$NPM_OTP"
          else
            npm publish --provenance --access public
          fi
