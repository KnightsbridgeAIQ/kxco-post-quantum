name: Scorecard supply-chain security

# OpenSSF Scorecard. Runs weekly + on push to main. Results are uploaded as
# SARIF so they surface in the GitHub Security tab, and published to the
# public OpenSSF API so Socket.dev (and other tools) can read the score.
#
# All third-party actions are pinned by 40-char commit SHA.

on:
  branch_protection_rule:
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday 06:00 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF
      id-token: write          # publish results to OpenSSF
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@fee9466b8957867761f2d78f922ab084e3e2dd17 # v3
        with:
          sarif_file: results.sarif
